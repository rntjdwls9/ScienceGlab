<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 · ScienceGlab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: {
      50:"#fef2f2",100:"#fee2e2",500:"#ef4444",600:"#dc2626",700:"#b91c1c"
    } } } } };
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
      "Apple SD Gothic Neo", "Noto Sans KR", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="inline-block w-12 h-12 rounded-xl bg-brand-600 text-white
                   text-center leading-[3rem] font-bold text-xl">S</span>
      <h1 class="mt-3 text-2xl font-bold text-slate-800">ScienceGlab</h1>
      <p class="text-sm text-slate-500 mt-1">로그인하여 시작하세요</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4 space-y-2">
          {% for cat, msg in messages %}
            <div class="px-4 py-3 rounded-md text-sm
              {% if cat == 'error' %}bg-red-50 text-red-700 border border-red-200
              {% else %}bg-emerald-50 text-emerald-700 border border-emerald-200{% endif %}">
              {{ msg }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" class="bg-white border border-slate-200 rounded-xl shadow-sm p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1.5">아이디</label>
        <input type="text" name="username" required autofocus autocomplete="username"
               class="w-full px-3 py-2 border border-slate-300 rounded-md
                      focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1.5">비밀번호</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-3 py-2 border border-slate-300 rounded-md
                      focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
      </div>
      <button type="submit"
              class="w-full px-4 py-2.5 bg-brand-600 text-white rounded-md font-medium
                     hover:bg-brand-700">
        로그인
      </button>
    </form>

    <p class="text-xs text-slate-400 text-center mt-6">
      계정이 없다면 관리자에게 문의하세요.
    </p>
  </div>

</body>
</html>
