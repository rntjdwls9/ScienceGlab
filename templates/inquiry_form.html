{% extends "base.html" %}
{% block title %}문의 작성{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-bold mb-1">문의 작성</h1>
  <p class="text-sm text-slate-500 mb-6">
    작성한 문의는 관리자와 본인만 볼 수 있습니다.
  </p>

  <form method="post" enctype="multipart/form-data"
        action="{{ url_for('inquiries_create') }}"
        class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">제목</label>
      <input type="text" name="title" required maxlength="200"
             class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm
                    focus:outline-none focus:ring-2 focus:ring-brand-500" />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">내용</label>
      <textarea name="body" rows="10"
                placeholder="문의·건의 내용을 자세히 적어주세요."
                class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm
                       focus:outline-none focus:ring-2 focus:ring-brand-500"></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">이미지 (선택)</label>
      <input type="file" name="image" accept="image/*"
             class="block text-sm text-slate-600" />
      <p class="text-xs text-slate-400 mt-1">png/jpg/jpeg/gif/webp · 최대 16MB</p>
    </div>

    <div class="flex items-center gap-2 pt-3">
      <button type="submit"
              class="px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-md hover:bg-brand-700">
        등록
      </button>
      <a href="{{ url_for('inquiries_list') }}"
         class="px-4 py-2 text-sm text-slate-600 rounded-md hover:bg-slate-100">취소</a>
    </div>
  </form>
</section>
{% endblock %}
