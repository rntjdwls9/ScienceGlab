{% extends "base.html" %}
{% block title %}동영상 학습{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto px-6 py-10">
  <div class="mb-8">
    <h1 class="text-2xl font-bold mb-1">동영상 학습</h1>
    <p class="text-sm text-slate-500">학년별 학습 영상을 모아둔 공간입니다.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    {% for r in roots %}
      <a href="{{ url_for('learning_folder', fid=r['id']) }}"
         class="block border border-slate-200 rounded-xl p-6 text-center
                hover:border-brand-500 hover:bg-brand-50 transition">
        <div class="text-3xl mb-2">📚</div>
        <div class="text-lg font-semibold">{{ r['name'] }}</div>
      </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
