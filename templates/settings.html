{% extends "base.html" %}
{% block title %}설정{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-6 py-10">
  <h1 class="text-2xl font-bold mb-1">설정</h1>
  <p class="text-sm text-slate-500 mb-8">
    여기서 저장한 학원/단체 이름과 로고는 모든 시험지의 헤더 오른쪽 아래에 자동으로 들어갑니다.
  </p>

  <form method="post" enctype="multipart/form-data" class="space-y-6">
    <div>
      <label class="block text-sm font-medium mb-2">학원/단체 이름</label>
      <input type="text" name="academy_text" maxlength="60"
             value="{{ academy_text }}"
             placeholder="예: 사이언스글랩 과학학원"
             class="w-full px-3 py-2 border border-slate-300 rounded-md
                    focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
      <p class="mt-1 text-xs text-slate-400">로고가 없을 때 텍스트로 표시됩니다. 로고가 있으면 로고 옆에 함께 표시됩니다.</p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-2">로고 이미지 (선택)</label>
      <label class="flex flex-col items-center justify-center w-full h-44
                    border-2 border-dashed border-slate-300 rounded-lg cursor-pointer
                    hover:border-brand-500 hover:bg-brand-50/40 transition relative">
        <input type="file" name="academy_logo" accept="image/*" class="hidden" id="logo_input"
               onchange="previewLogo(this)" />
        {% if academy_logo %}
          <img id="logo-preview"
               src="{{ url_for('uploaded_file', filename=academy_logo) }}"
               class="max-h-40 object-contain" />
          <span class="absolute bottom-1 right-2 text-[10px] text-slate-400 bg-white/80 px-1 rounded">
            현재 로고
          </span>
        {% else %}
          <img id="logo-preview" class="hidden max-h-40 object-contain" />
          <div id="logo-placeholder" class="text-slate-400 text-sm text-center px-4">
            클릭해서 로고 이미지 선택<br/>
            <span class="text-xs">(png, jpg, jpeg, gif, webp / 가로형 권장)</span>
          </div>
        {% endif %}
      </label>
      {% if academy_logo %}
        <label class="mt-2 inline-flex items-center gap-1 text-xs text-slate-600">
          <input type="checkbox" name="remove_logo" value="1" class="accent-red-600" />
          로고 삭제 (저장 시 적용)
        </label>
      {% endif %}
    </div>

    <div class="flex items-center gap-2 pt-2">
      <button type="submit"
              class="px-5 py-2.5 bg-brand-600 text-white rounded-md font-medium hover:bg-brand-700">
        저장
      </button>
      <a href="{{ url_for('search') }}"
         class="px-5 py-2.5 bg-slate-100 text-slate-700 rounded-md font-medium hover:bg-slate-200">
        취소
      </a>
    </div>
  </form>
</section>
{% endblock %}

{% block scripts %}
<script>
  function previewLogo(input) {
    const f = input.files && input.files[0];
    if (!f) return;
    const img = document.getElementById('logo-preview');
    const ph  = document.getElementById('logo-placeholder');
    const r = new FileReader();
    r.onload = e => {
      img.src = e.target.result;
      img.classList.remove('hidden');
      if (ph) ph.classList.add('hidden');
    };
    r.readAsDataURL(f);
  }
</script>
{% endblock %}
